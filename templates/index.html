<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>Exam Performance · Index</title>
    <!-- Google Font & Material Icons (for extra polish) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ----- reset & base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #f0f6fe 0%, #e3ecf7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* ----- main card (index) ----- */
        .index-card {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background: #ffffff;
            border-radius: 56px;
            padding: 3.5rem 3.8rem;
            box-shadow:
                0 30px 60px -18px rgba(0, 30, 50, 0.3),
                0 12px 32px -8px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
            text-align: center;
        }

        @media (max-width: 600px) {
            .index-card {
                padding: 2.2rem 1.5rem;
                border-radius: 40px;
            }
        }

        @media (max-width: 420px) {
            .index-card {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
        }

        /* ----- hero / heading ----- */
        .index-card .logo-badge {
            display: inline-block;
            background: rgba(26, 115, 232, 0.08);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #1a5a9e;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(26, 115, 232, 0.15);
        }

        .index-card h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: #0b2b3d;
            margin-bottom: 0.4rem;
        }

        .index-card h1 .highlight {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .index-card .subhead {
            font-size: 1.2rem;
            font-weight: 400;
            color: #2c506a;
            max-width: 520px;
            margin: 0.4rem auto 1.8rem auto;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* ----- feature mini-grid (decorative) ----- */
        .feature-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem 1.2rem;
            margin: 1.5rem 0 2.2rem 0;
        }

        .feature-item {
            background: #f2f8ff;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1a4a6a;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid rgba(26, 115, 232, 0.08);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.01);
        }

        .feature-item::before {
            content: "✦";
            font-size: 0.7rem;
            color: #1a73e8;
            opacity: 0.7;
        }

        /* ----- main CTA button (Material style) ----- */
        .btn-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 3.2rem;
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            border: none;
            border-radius: 80px;
            box-shadow: 0 12px 28px -8px rgba(26, 115, 232, 0.45);
            transition: all 0.25s ease;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.2px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 0.4rem;
        }

        .btn-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 36px -10px rgba(26, 115, 232, 0.55);
            background: linear-gradient(135deg, #2b7cf0 0%, #0f4a9e 100%);
        }

        .btn-cta:active {
            transform: scale(0.97);
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.4);
        }

        .btn-cta .arrow {
            display: inline-block;
            transition: transform 0.2s ease;
            font-size: 1.4rem;
            line-height: 1;
        }

        .btn-cta:hover .arrow {
            transform: translateX(6px);
        }

        /* ----- secondary info / footer ----- */
        .index-footer {
            margin-top: 2.6rem;
            font-size: 0.9rem;
            color: #3f627e;
            opacity: 0.7;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem 1.8rem;
        }

        .index-footer span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .index-footer .dot {
            width: 6px;
            height: 6px;
            background: #1a73e8;
            border-radius: 10px;
            opacity: 0.3;
            display: inline-block;
        }

        /* responsiveness */
        @media (max-width: 500px) {
            .index-card h1 {
                font-size: 2.3rem;
            }
            .subhead {
                font-size: 1rem;
            }
            .btn-cta {
                width: 100%;
                padding: 0.9rem 1.5rem;
                font-size: 1.1rem;
            }
            .feature-grid {
                gap: 0.5rem;
            }
            .feature-item {
                font-size: 0.75rem;
                padding: 0.4rem 1rem;
            }
            .index-footer {
                flex-direction: column;
                gap: 0.3rem;
            }
        }

        @media (max-width: 380px) {
            .index-card {
                padding: 1.2rem 0.8rem;
            }
            .index-card h1 {
                font-size: 1.8rem;
            }
        }

        /* focus / accessibility */
        .btn-cta:focus-visible {
            outline: 3px solid #1a73e8;
            outline-offset: 4px;
        }
    </style>
</head>
<body>
    <div class="index-card">
        <!-- small badge -->
        <div class="logo-badge">✦ Student Success</div>

        <!-- main heading -->
        <h1>
            Exam Performance<br />
            <span class="highlight">Predictor</span>
        </h1>

        <p class="subhead">
            Unlock your maths score potential. <br />
            Powered by machine learning &amp; student data.
        </p>

        <!-- feature pills (decorative) -->
        <div class="feature-grid">
            <span class="feature-item">Gender &amp; ethnicity</span>
            <span class="feature-item">Parental education</span>
            <span class="feature-item">Lunch &amp; test prep</span>
            <span class="feature-item">Reading &amp; writing scores</span>
        </div>

        <!-- primary CTA – redirects to /predict-datapoint (or the form) -->
        <a href="{{ url_for('predict_datapoint') }}" class="btn-cta">
            <span>Go to prediction</span>
            <span class="arrow">→</span>
        </a>

        <!-- footer / extra info -->
        <div class="index-footer">
            <span><span class="dot"></span> 100% free</span>
            <span><span class="dot"></span> No sign-up</span>
            <span><span class="dot"></span> Instant result</span>
        </div>
    </div>
</body>
</html>
